version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketos_postgres
    environment:
      POSTGRES_USER: marketos
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: marketos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketos_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: marketos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@marketos.io
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: marketos_redisinsight
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
