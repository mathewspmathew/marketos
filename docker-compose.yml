services:
  redis:
    image: redis:7-alpine
    container_name: marketos_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:  
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scraper-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: scraper_worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - GCS_IMAGE_BUCKET=${GCS_IMAGE_BUCKET}
      - GCS_MARKDOWN_BUCKET=${GCS_MARKDOWN_BUCKET}
      - GOOGLE_CLOUD_PROJECT=${VERTEX_PROJECT}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
      - ~/.config/gcloud:/root/.config/gcloud:ro
    command: ["uv", "run", "celery", "-A", "services.common.celery_app", "worker", "-Q", "scraping_queue", "-n", "scraper-worker@%h", "--concurrency=2", "--loglevel=info"]

  extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: extraction_worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GCS_IMAGE_BUCKET=${GCS_IMAGE_BUCKET}
      - GCS_MARKDOWN_BUCKET=${GCS_MARKDOWN_BUCKET}
      - GOOGLE_CLOUD_PROJECT=${VERTEX_PROJECT}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
      - ~/.config/gcloud:/root/.config/gcloud:ro
    # concurrency=1 + rate_limit='3/m' = 3 Groq calls/min = ~7800 tokens/min
    # safely under the free-tier 14400 TPM limit for llama-3.1-8b-instant
    command: ["uv", "run", "celery", "-A", "services.common.celery_app", "worker", "-Q", "extraction_queue", "-n", "extraction-worker@%h", "--concurrency=1", "--loglevel=info"]

  scheduler-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: scheduler_worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
    command: ["uv", "run", "celery", "-A", "services.common.celery_app", "worker", "-Q", "scheduler_queue", "--concurrency=1", "--loglevel=info"]

  semantic-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: semantic_worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
    # concurrency=1 + rate_limit='3/m' keeps Groq TPM usage separate from extraction
    command: ["uv", "run", "celery", "-A", "services.common.celery_app", "worker", "-Q", "semantic_queue", "-n", "semantic-worker@%h", "--concurrency=1", "--loglevel=info"]

  embedding-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: embedding_worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - VERTEX_PROJECT=${VERTEX_PROJECT}
      - VERTEX_LOCATION=${VERTEX_LOCATION}
      - GOOGLE_CLOUD_PROJECT=${VERTEX_PROJECT}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
      - ~/.config/gcloud:/root/.config/gcloud:ro
    command: ["uv", "run", "celery", "-A", "services.common.celery_app", "worker", "-Q", "embedding_queue", "--concurrency=2", "--loglevel=info"]

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: celery_beat
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services:/app/services
    # celery_beat module is included via celery_app.py's include list
    command: ["uv", "run", "celery", "-A", "services.common.celery_app", "beat", "--loglevel=info"]

volumes:
  redis_data:
